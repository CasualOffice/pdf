name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Active now: lint the planning docs.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Markdown lint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"
      - name: Check local doc links
        run: bash scripts/check-links.sh

  # Detect whether app code has landed yet, so web/rust jobs activate automatically.
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_web: ${{ steps.c.outputs.has_web }}
      has_rust: ${{ steps.c.outputs.has_rust }}
    steps:
      - uses: actions/checkout@v4
      - id: c
        run: |
          if [ -f apps/web/package.json ]; then echo "has_web=true" >> "$GITHUB_OUTPUT"; else echo "has_web=false" >> "$GITHUB_OUTPUT"; fi
          if [ -f crates/casual-pdf-core/Cargo.toml ]; then echo "has_rust=true" >> "$GITHUB_OUTPUT"; else echo "has_rust=false" >> "$GITHUB_OUTPUT"; fi

  # Activates automatically once apps/web/ exists (Phase 0+).
  web:
    needs: detect
    if: needs.detect.outputs.has_web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint --if-present
      - run: pnpm run typecheck --if-present
      - run: pnpm run build --if-present
      - run: pnpm run test --if-present

  # Activates automatically once crates/casual-pdf-core/ exists (Phase 0+).
  rust:
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/casual-pdf-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo build --target wasm32-unknown-unknown
