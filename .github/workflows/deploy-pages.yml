name: Deploy (GitHub Pages)

# Auto-deploys to pdf.casualoffice.org on push to main.
# Prereqs (done 2026-06-27): Pages Source = GitHub Actions; repo variable
# PAGES_CUSTOM_DOMAIN = pdf.casualoffice.org (writes CNAME below); DNS CNAME ->
# casualoffice.github.io with Enforce HTTPS.
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Safe no-op until the web app exists.
    if: ${{ hashFiles('apps/web/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # vendor/design-system (link: override) must be present for install
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/web run build
      - name: Apply custom domain (if configured)
        run: |
          if [ -n "${{ vars.PAGES_CUSTOM_DOMAIN }}" ]; then
            echo "${{ vars.PAGES_CUSTOM_DOMAIN }}" > apps/web/dist/CNAME
            echo "CNAME set to ${{ vars.PAGES_CUSTOM_DOMAIN }}"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
