# Permissive markdown lint config — keep docs structurally sane without fighting prose/tables.
config:
  MD013: false  # line length
  MD033: false  # inline HTML
  MD024: false  # duplicate headings (e.g. repeated "## Sources")
  MD041: false  # first line must be top-level heading
  MD026: false  # trailing punctuation in heading
  MD036: false  # emphasis used instead of heading
  MD040: false  # fenced code language
  MD046: false  # code block style
  MD029: false  # ordered list item prefix
  MD007: false  # unordered list indentation
  MD012: false  # multiple consecutive blank lines
  MD034: false  # bare URL
  MD060: false  # table column style (we use compact pipes)
  MD022: false  # blanks around headings
  MD032: false  # blanks around lists
  MD031: false  # blanks around fenced code
  MD058: false  # blanks around tables
  MD009: false  # trailing spaces
  MD047: false  # single trailing newline
  MD004: false  # unordered list style
  MD005: false  # inconsistent list indentation
globs:
  - "**/*.md"
ignores:
  - "node_modules"
  - "**/node_modules"
