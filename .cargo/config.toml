# Cargo config for the casual-pdf-core wasm build.
#
# casual-pdf-core compiles to wasm32 for the browser worker (surgical redaction,
# structure ops). lopdf pulls rand → getrandom via its always-on encryption
# support, and getrandom 0.3 needs an explicit backend selection on
# wasm32-unknown-unknown. Scoped to the wasm target so native (desktop/Tauri)
# builds are completely unaffected.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
